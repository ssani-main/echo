<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Transcript</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Newsreader:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ==============================================
       1. DESIGN TOKENS
    =============================================== */
    :root {
      --paper:        #FBFAF7;
      --surface:      #FFFFFF;
      --ink:          #16181D;
      --muted:        #6C7178;
      --rule:         #E7E4DD;
      --accent:       #0B6B4F;
      --accent-dark:  #095C43;
      --accent-soft:  #E6F0EB;
      --warn:         #B4232A;

      --font-sans:  'Space Grotesk', system-ui, sans-serif;
      --font-serif: 'Newsreader', Georgia, serif;
      --font-mono:  'JetBrains Mono', 'Courier New', monospace;

      --radius:   8px;
      --col-max:  760px;
    }

    /* ==============================================
       2. BASE RESET & BODY
    =============================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: var(--paper);
    }

    body {
      font-family: var(--font-sans);
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      padding: 2.75rem 1.5rem 5rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ==============================================
       3. LAYOUT COLUMN
    =============================================== */
    .container {
      max-width: var(--col-max);
      margin: 0 auto;
    }

    /* ==============================================
       4. HEADER / HERO
    =============================================== */
    .site-header {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 2.25rem;
    }

    .wordmark {
      display: flex;
      align-items: center;
      gap: 0.55rem;
    }

    .wordmark-text {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink);
    }

    /* Record dot */
    .record-dot {
      width: 8px;
      height: 8px;
      flex-shrink: 0;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse-dot 1.6s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    @media (prefers-reduced-motion: reduce) {
      .record-dot {
        animation: none;
        opacity: 1;
      }
    }

    .site-tagline {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .site-tagline em {
      font-style: italic;
    }

    /* Usage chip in header */
    .usage-chip {
      display: none;
      font-family: var(--font-sans);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.01em;
      line-height: 1.5;
    }

    .usage-chip.visible {
      display: block;
    }

    .usage-chip .mono {
      font-family: var(--font-mono);
      font-size: 0.7rem;
    }

    /* Now-reading strip */
    .now-reading {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      padding: 0.55rem 0.8rem;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .now-reading-label {
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .now-reading-title {
      font-family: var(--font-serif);
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .now-reading-url {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .now-reading-url:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .now-reading-url:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-radius: 2px;
    }

    /* ==============================================
       5. COMMAND BAR
    =============================================== */
    .command-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    #urlInput {
      flex: 1;
      min-width: 0;
      padding: 0.65rem 0.9rem;
      font-family: var(--font-mono);
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--ink);
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #urlInput::placeholder {
      color: var(--muted);
      opacity: 1;
    }

    #urlInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    #fetchBtn {
      padding: 0.65rem 1.4rem;
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 500;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      white-space: nowrap;
      outline: none;
      transition: background 0.15s;
    }

    #fetchBtn:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    #fetchBtn:focus-visible {
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    #fetchBtn:active:not(:disabled) {
      background: var(--accent-dark);
      filter: brightness(0.92);
    }

    #fetchBtn:disabled {
      background: var(--muted);
      opacity: 0.6;
      cursor: default;
    }

    /* ==============================================
       6. STATUS LINE
    =============================================== */
    #status {
      min-height: 1.4em;
      font-family: var(--font-sans);
      font-size: 0.8rem;
      color: #b91c1c;
      margin-bottom: 1rem;
      letter-spacing: 0.01em;
    }

    #status.info {
      color: var(--muted);
    }

    /* ==============================================
       7. TAB BAR
    =============================================== */
    .tab-bar {
      display: inline-flex;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }

    .tab-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.375rem 0.9rem;
      font-family: var(--font-sans);
      font-size: 0.775rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--muted);
      background: transparent;
      border: none;
      border-right: 1px solid var(--rule);
      cursor: pointer;
      outline: none;
      transition: background 0.12s, color 0.12s;
      /* Prevent button from shrinking text */
      white-space: nowrap;
    }

    .tab-btn:last-child {
      border-right: none;
    }

    .tab-btn[aria-selected="true"] {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .tab-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    /* Ready dot on Digest tab */
    .digest-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* ==============================================
       8. CONTROLS ROW
    =============================================== */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    /* --- Segmented view toggle --- */
    .view-toggle {
      display: inline-flex;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 6px;
      overflow: hidden;
    }

    .view-toggle label {
      position: relative;
      display: flex;
      align-items: center;
      padding: 0.375rem 0.9rem;
      font-family: var(--font-sans);
      font-size: 0.775rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: background 0.12s, color 0.12s;
    }

    .view-toggle label:not(:last-child) {
      border-right: 1px solid var(--rule);
    }

    /* Hide actual radio circles */
    .view-toggle input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    /* Active segment — :has() for modern browsers */
    .view-toggle label:has(input:checked) {
      background: var(--accent-soft);
      color: var(--accent);
    }

    /* Active segment — JS-added class for full browser coverage */
    .view-toggle label.is-active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    /* Keyboard focus ring on the label when radio is focused */
    .view-toggle label:focus-within {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    /* --- AI Digest button --- */
    #digestBtn {
      padding: 0.375rem 1rem;
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--accent);
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      outline: none;
      transition: background 0.15s, color 0.15s;
    }

    #digestBtn:hover:not(:disabled) {
      background: var(--accent-soft);
    }

    #digestBtn:focus-visible {
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    #digestBtn:disabled {
      color: var(--muted);
      border-color: var(--rule);
      opacity: 0.6;
      cursor: default;
    }

    /* --- Save button (same outline style as digestBtn) --- */
    #saveBtn {
      padding: 0.375rem 1rem;
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--accent);
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      outline: none;
      transition: background 0.15s, color 0.15s;
    }

    #saveBtn:hover:not(:disabled) {
      background: var(--accent-soft);
    }

    #saveBtn:focus-visible {
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    #saveBtn:disabled {
      color: var(--muted);
      border-color: var(--rule);
      opacity: 0.6;
      cursor: default;
    }

    /* ==============================================
       9. TRANSCRIPT OUTPUT
    =============================================== */
    #output {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      word-break: break-word;
      min-height: 6rem;
      display: none;
      margin-bottom: 1.5rem;
    }

    #output.visible {
      display: block;
      animation: fade-slide-in 0.25s ease;
    }

    @keyframes fade-slide-in {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      #output.visible,
      #digestOutput.visible {
        animation: none;
      }
    }

    /* Empty state */
    #output .empty-state {
      font-family: var(--font-serif);
      font-size: 1rem;
      font-style: italic;
      color: var(--muted);
    }

    /* Readable / plain mode: flowing paragraphs in serif */
    #output p {
      font-family: var(--font-serif);
      font-size: 1.075rem;
      line-height: 1.72;
      color: var(--ink);
      margin-bottom: 1.1em;
    }

    #output p:last-child {
      margin-bottom: 0;
    }

    /* ==============================================
       10. TIMECODED MODE — GUTTER LAYOUT
    =============================================== */
    .ts-line {
      display: flex;
      align-items: baseline;
      line-height: 1.65;
      padding: 0.12rem 0;
      border-bottom: 1px solid transparent; /* keeps rhythm even without visible border */
    }

    .ts-badge {
      flex-shrink: 0;
      width: 68px;
      font-family: var(--font-mono);
      font-size: 0.73rem;
      font-weight: 500;
      color: var(--accent);
      text-align: right;
      padding-right: 0.9rem;
      border-right: 1px solid var(--rule);
      letter-spacing: 0.01em;
      /* override any lingering inline-block display */
      display: inline-block;
    }

    .ts-text {
      flex: 1;
      font-family: var(--font-serif);
      font-size: 0.975rem;
      color: var(--ink);
      padding-left: 0.9rem;
      line-height: 1.65;
    }

    /* ==============================================
       11. DIGEST PANE
    =============================================== */

    /* Empty state shown before any digest */
    .digest-empty-state {
      font-family: var(--font-serif);
      font-style: italic;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.65;
      padding: 2rem 0;
    }

    .digest-empty-state.is-hidden {
      display: none;
    }

    /* Digest status line */
    #digestStatus {
      min-height: 1.4em;
      font-family: var(--font-sans);
      font-size: 0.8rem;
      color: #b91c1c;
      margin-bottom: 0.75rem;
      letter-spacing: 0.01em;
    }

    #digestStatus.info {
      color: var(--muted);
    }

    /* Digest output panel */
    #digestOutput {
      display: none;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      word-break: break-word;
    }

    #digestOutput.visible {
      display: block;
      animation: fade-slide-in 0.25s ease;
    }

    /* Eyebrow label — injected before markdown content */
    .digest-eyebrow {
      font-family: var(--font-sans);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.1rem;
    }

    /* Markdown output elements inside digest panel */
    #digestOutput h2 {
      font-family: var(--font-sans);
      font-size: 0.975rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.01em;
      margin-top: 1.5rem;
      margin-bottom: 0.45rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--rule);
    }

    #digestOutput h2:first-of-type {
      margin-top: 0;
    }

    #digestOutput h3 {
      font-family: var(--font-sans);
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--ink);
      margin-top: 1rem;
      margin-bottom: 0.35rem;
    }

    #digestOutput p {
      font-family: var(--font-serif);
      font-size: 1rem;
      line-height: 1.72;
      color: var(--ink);
      margin-bottom: 0.8rem;
    }

    #digestOutput p:last-child {
      margin-bottom: 0;
    }

    #digestOutput ul {
      padding-left: 1.5rem;
      margin-bottom: 0.85rem;
    }

    #digestOutput li {
      font-family: var(--font-serif);
      font-size: 1rem;
      line-height: 1.7;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }

    #digestOutput strong {
      font-weight: 600;
    }

    /* Per-digest + session usage stats */
    .usage-stats {
      display: none;
      margin-top: 0.9rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--rule);
    }

    .usage-stats.visible {
      display: block;
    }

    .usage-line {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.7;
      letter-spacing: 0.01em;
    }

    .usage-line .mono {
      font-family: var(--font-mono);
      font-size: 0.7rem;
    }

    /* ==============================================
       12. TOP FIXED INDICATOR
    =============================================== */
    #topIndicator {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: none;
      align-items: center;
      gap: 0.45rem;
      padding: 0.45rem 1.1rem;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 999px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      /* Smooth appear/disappear */
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    #topIndicator.visible {
      display: flex;
      opacity: 1;
    }

    #topIndicator.done {
      color: var(--accent);
      cursor: pointer;
    }

    #topIndicator.error {
      color: var(--warn);
    }

    /* Pulsing dot inside the indicator (digesting state) */
    .indicator-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: pulse-dot 1.6s ease-in-out infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      .indicator-dot {
        animation: none;
        opacity: 1;
      }
    }

    /* On small screens push indicator to bottom so it doesn't block the URL bar */
    @media (max-width: 520px) {
      #topIndicator {
        top: auto;
        bottom: 1.25rem;
        font-size: 0.75rem;
        padding: 0.4rem 0.9rem;
      }
    }

    /* ==============================================
       13. SAVED PANE
    =============================================== */
    .saved-empty-state {
      font-family: var(--font-serif);
      font-size: 1rem;
      font-style: italic;
      color: var(--muted);
      padding: 2rem 0;
    }

    .saved-card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 0.9rem 1.1rem;
      margin-bottom: 0.55rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.12s, box-shadow 0.12s;
    }

    .saved-card:hover {
      border-color: var(--accent);
    }

    .saved-card:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .saved-card-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .saved-card-title {
      font-family: var(--font-serif);
      font-size: 0.975rem;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .saved-card-url {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .saved-card-url:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .saved-card-url:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-radius: 2px;
      color: var(--accent);
    }

    .saved-card-meta {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex-wrap: wrap;
      margin-top: 0.25rem;
    }

    .saved-meta-item {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    .saved-meta-sep {
      font-size: 0.7rem;
      color: var(--rule);
      line-height: 1;
    }

    .saved-badge {
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
    }

    .saved-delete-btn {
      flex-shrink: 0;
      align-self: center;
      padding: 0.25rem 0.6rem;
      font-family: var(--font-sans);
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 4px;
      cursor: pointer;
      outline: none;
      white-space: nowrap;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }

    .saved-delete-btn:hover {
      color: var(--warn);
      border-color: var(--warn);
      background: #fef2f2;
    }

    .saved-delete-btn:focus-visible {
      color: var(--warn);
      border-color: var(--warn);
      box-shadow: 0 0 0 3px rgba(180, 35, 42, 0.12);
    }

    /* ==============================================
       14. RESPONSIVE
    =============================================== */
    @media (max-width: 520px) {
      body {
        padding: 1.75rem 1rem 3.5rem;
      }

      .command-bar {
        flex-direction: column;
      }

      #fetchBtn {
        width: 100%;
        text-align: center;
      }

      #output,
      #digestOutput {
        padding: 1.1rem 1.1rem;
      }

      .ts-badge {
        width: 52px;
        padding-right: 0.6rem;
      }

      .ts-text {
        padding-left: 0.6rem;
      }

      .saved-card {
        padding: 0.75rem 0.85rem;
        flex-wrap: wrap;
      }

      .saved-delete-btn {
        margin-top: 0.25rem;
      }
    }

    /* Very narrow screens: tighten tab padding */
    @media (max-width: 360px) {
      .tab-btn {
        padding: 0.375rem 0.6rem;
        font-size: 0.72rem;
      }
    }
  </style>
</head>
<body>

  <!-- TOP STATUS INDICATOR (fixed, outside container) -->
  <div id="topIndicator" aria-live="polite" aria-atomic="true"></div>

  <div class="container">

    <!-- HEADER / HERO -->
    <header class="site-header">
      <div class="wordmark">
        <span class="record-dot" aria-hidden="true"></span>
        <span class="wordmark-text">Transcript</span>
      </div>
      <p class="site-tagline">Paste a YouTube link. Read what was <em>actually</em> said.</p>

      <!-- NOW READING strip — hidden until a video is loaded -->
      <div id="nowReading" class="now-reading" hidden>
        <span class="now-reading-label">Now reading</span>
        <span id="nowReadingTitle" class="now-reading-title"></span>
        <a id="nowReadingUrl" class="now-reading-url" target="_blank" rel="noopener noreferrer"></a>
      </div>

      <div
        id="usageChip"
        class="usage-chip"
        title="Your total Claude Code usage today (not the subscription limit %)."
      ></div>
    </header>

    <!-- COMMAND BAR -->
    <div class="command-bar">
      <input
        id="urlInput"
        type="text"
        placeholder="youtube.com/watch?v=…"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="fetchBtn">Get transcript</button>
    </div>

    <!-- STATUS LINE -->
    <div id="status"></div>

    <!-- TAB BAR (3 tabs) -->
    <div class="tab-bar" role="tablist" aria-label="Content sections">
      <button
        class="tab-btn"
        id="tabTranscript"
        role="tab"
        aria-selected="true"
        aria-controls="paneTranscript"
        tabindex="0"
      >Transcript</button>
      <button
        class="tab-btn"
        id="tabDigest"
        role="tab"
        aria-selected="false"
        aria-controls="paneDigest"
        tabindex="-1"
      >Digest <span id="digestDot" class="digest-dot" style="display:none" aria-hidden="true"></span></button>
      <button
        class="tab-btn"
        id="tabSaved"
        role="tab"
        aria-selected="false"
        aria-controls="paneSaved"
        tabindex="-1"
      >Saved</button>
    </div>

    <!-- TRANSCRIPT PANE -->
    <div id="paneTranscript" role="tabpanel" aria-labelledby="tabTranscript">
      <!-- CONTROLS ROW -->
      <div class="controls-row">
        <div class="view-toggle" role="group" aria-label="View mode">
          <label>
            <input type="radio" name="viewMode" value="plain" checked />
            Readable
          </label>
          <label>
            <input type="radio" name="viewMode" value="timestamps" />
            Timecoded
          </label>
        </div>
        <button id="digestBtn" disabled>AI digest</button>
        <button id="saveBtn" disabled>&#9733; Save</button>
      </div>

      <!-- TRANSCRIPT OUTPUT -->
      <div id="output" class="visible">
        <p class="empty-state">Nothing loaded yet — drop a link above to pull the transcript.</p>
      </div>
    </div>

    <!-- DIGEST PANE -->
    <div id="paneDigest" role="tabpanel" aria-labelledby="tabDigest" hidden>
      <p id="digestEmptyState" class="digest-empty-state">No digest yet — hit AI digest to summarize this video in English.</p>
      <div id="digestStatus"></div>
      <div id="digestOutput"></div>
      <div id="usageStats" class="usage-stats"></div>
    </div>

    <!-- SAVED PANE -->
    <div id="paneSaved" role="tabpanel" aria-labelledby="tabSaved" hidden>
      <div id="savedOutput"></div>
    </div>

  </div><!-- /.container -->

  <script>
    /* ==============================================
       STATE
    =============================================== */
    let lastSegments   = null;
    let sessionCostUsd = 0;
    let sessionTokens  = 0;
    let indicatorTimer = null;
    let currentMeta    = null;  // { videoId, url, title }
    let currentDigest  = null;  // string | null

    /* ==============================================
       ELEMENT REFS
    =============================================== */
    const urlInput        = document.getElementById('urlInput');
    const fetchBtn        = document.getElementById('fetchBtn');
    const statusEl        = document.getElementById('status');
    const outputEl        = document.getElementById('output');
    const radios          = document.querySelectorAll('input[name="viewMode"]');
    const digestBtn       = document.getElementById('digestBtn');
    const saveBtn         = document.getElementById('saveBtn');
    const digestStatus    = document.getElementById('digestStatus');
    const digestOutput    = document.getElementById('digestOutput');
    const topIndicator    = document.getElementById('topIndicator');
    const paneTranscript  = document.getElementById('paneTranscript');
    const paneDigest      = document.getElementById('paneDigest');
    const paneSaved       = document.getElementById('paneSaved');
    const tabTranscript   = document.getElementById('tabTranscript');
    const tabDigest       = document.getElementById('tabDigest');
    const tabSaved        = document.getElementById('tabSaved');
    const digestDot       = document.getElementById('digestDot');
    const digestEmptySt   = document.getElementById('digestEmptyState');
    const usageStatsEl    = document.getElementById('usageStats');
    const usageChipEl     = document.getElementById('usageChip');
    const savedOutput     = document.getElementById('savedOutput');
    const nowReadingEl    = document.getElementById('nowReading');
    const nowReadingTitle = document.getElementById('nowReadingTitle');
    const nowReadingUrl   = document.getElementById('nowReadingUrl');

    /* ==============================================
       TAB SWITCHING
    =============================================== */
    function switchTab(name) {
      const names   = ['transcript', 'digest', 'saved'];
      const tabEls  = [tabTranscript, tabDigest, tabSaved];
      const paneEls = [paneTranscript, paneDigest, paneSaved];

      names.forEach((n, i) => {
        const active = n === name;
        tabEls[i].setAttribute('aria-selected', active ? 'true' : 'false');
        tabEls[i].tabIndex = active ? 0 : -1;
        paneEls[i].hidden  = !active;
      });

      if (name === 'saved') loadSaved();
    }

    tabTranscript.addEventListener('click', () => switchTab('transcript'));
    tabDigest.addEventListener('click',     () => switchTab('digest'));
    tabSaved.addEventListener('click',      () => switchTab('saved'));

    // Arrow-key roving focus within the tab bar (3 tabs)
    const tabBtns  = [tabTranscript, tabDigest, tabSaved];
    const tabNames = ['transcript', 'digest', 'saved'];
    tabBtns.forEach((btn, i) => {
      btn.addEventListener('keydown', e => {
        let next = null;
        if (e.key === 'ArrowRight') next = (i + 1) % tabBtns.length;
        if (e.key === 'ArrowLeft')  next = (i - 1 + tabBtns.length) % tabBtns.length;
        if (next !== null) {
          e.preventDefault();
          tabBtns[next].focus();
          switchTab(tabNames[next]);
        }
      });
    });

    /* ==============================================
       SEGMENTED TOGGLE ACTIVE-CLASS (cross-browser :has fallback)
    =============================================== */
    function syncToggleActive() {
      document.querySelectorAll('.view-toggle label').forEach(lbl => {
        lbl.classList.toggle('is-active', lbl.querySelector('input[type="radio"]').checked);
      });
    }
    syncToggleActive();

    /* ==============================================
       STATUS HELPERS
    =============================================== */
    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className   = isError ? '' : 'info';
    }

    function setDigestStatus(msg, isError = false) {
      digestStatus.textContent = msg;
      digestStatus.className   = isError ? '' : 'info';
    }

    /* ==============================================
       TOP INDICATOR
    =============================================== */
    function setTopIndicator(state) {
      clearTimeout(indicatorTimer);

      // Reset
      topIndicator.className   = '';
      topIndicator.onclick     = null;
      topIndicator.onkeydown   = null;
      topIndicator.innerHTML   = '';
      topIndicator.removeAttribute('tabindex');
      topIndicator.removeAttribute('role');

      if (state === 'idle') return;

      topIndicator.classList.add('visible');

      if (state === 'digesting') {
        topIndicator.classList.add('digesting');
        topIndicator.innerHTML = '<span class="indicator-dot" aria-hidden="true"></span>AI is digesting…';

      } else if (state === 'done') {
        topIndicator.classList.add('done');
        topIndicator.innerHTML = 'Digest ready ✓';
        topIndicator.setAttribute('tabindex', '0');
        topIndicator.setAttribute('role', 'button');
        const activate = () => {
          switchTab('digest');
          setTopIndicator('idle');
        };
        topIndicator.onclick   = activate;
        topIndicator.onkeydown = e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activate(); }
        };
        indicatorTimer = setTimeout(() => setTopIndicator('idle'), 4000);

      } else if (state === 'error') {
        topIndicator.classList.add('error');
        topIndicator.innerHTML = 'Digest failed';
      }
    }

    /* ==============================================
       USAGE FORMATTING HELPERS
    =============================================== */
    function formatTokens(n) {
      if (n == null) return '—';
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
      if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'k';
      return String(n);
    }

    function formatCostUsd(usd) {
      if (usd == null) return null;
      return '$' + usd.toFixed(2);
    }

    /* ==============================================
       USAGE CHIP (header — today's totals)
    =============================================== */
    async function loadUsageChip() {
      try {
        const res  = await fetch('/api/usage');
        const data = await res.json();

        if (!res.ok || !data.available) {
          usageChipEl.innerHTML = 'Today &middot; <span class="mono">usage n/a</span>';
        } else {
          const costStr   = formatCostUsd(data.costUsd) ?? 'n/a';
          const tokenStr  = formatTokens(data.totalTokens);
          usageChipEl.innerHTML =
            'Today &middot; <span class="mono">' + costStr + '</span>' +
            ' &middot; <span class="mono">' + tokenStr + ' tokens</span>';
        }
        usageChipEl.classList.add('visible');
      } catch (_) { /* silently ignore — non-critical */ }
    }

    /* ==============================================
       PER-DIGEST + SESSION USAGE DISPLAY
    =============================================== */
    function renderUsageStats(u) {
      if (!u) return;

      // Accumulate session totals (called once per successful digest)
      if (u.totalTokens != null) sessionTokens  += u.totalTokens;
      if (u.costUsd     != null) sessionCostUsd += u.costUsd;

      // This-digest line
      const digestParts = [
        '<span class="mono">' + formatTokens(u.totalTokens) + ' tokens</span>',
      ];
      const thisCost = formatCostUsd(u.costUsd);
      if (thisCost) digestParts.push('<span class="mono">' + thisCost + '</span>');
      if (u.durationMs != null) {
        digestParts.push('<span class="mono">' + Math.round(u.durationMs / 1000) + 's</span>');
      }

      // Session line
      const sessCost   = formatCostUsd(sessionCostUsd) || '$0.00';
      const sessTokens = formatTokens(sessionTokens);
      const sessLine   =
        '<span class="mono">' + sessCost + '</span>' +
        ' &middot; <span class="mono">' + sessTokens + ' tokens</span>';

      usageStatsEl.innerHTML =
        '<div class="usage-line">This digest &middot; ' + digestParts.join(' &middot; ') + '</div>' +
        '<div class="usage-line">Session &middot; ' + sessLine + '</div>';
      usageStatsEl.classList.add('visible');
    }

    /* ==============================================
       CORE TRANSCRIPT UTILITIES
    =============================================== */
    function formatTime(seconds) {
      const s  = Math.floor(seconds);
      const m  = Math.floor(s / 60);
      const ss = String(s % 60).padStart(2, '0');
      return `${m}:${ss}`;
    }

    function getMode() {
      return [...radios].find(r => r.checked)?.value ?? 'plain';
    }

    /**
     * Reflows an array of { text, offset } segments into an array of paragraph strings.
     *
     * Paragraph breaks happen at sentence boundaries (., ?, ! optionally followed by
     * a closing quote/paren) using two signals:
     *   A) Accumulated buffer >= 350 chars AND segment ends at a sentence terminator.
     *   B) Pause to the next segment >= 3 s AND buffer ends at a sentence terminator
     *      AND buffer is already non-trivial (>= 80 chars).
     *
     * Fallback: if there is only one giant paragraph with no sentence punctuation at all
     * (e.g. auto-captions without punctuation), hard-wrap every ~500 chars at a space.
     */
    function reflowToParagraphs(segments) {
      if (!segments || segments.length === 0) return [];

      // Matches a sentence-terminating end: . ? ! optionally followed by closing quote/paren
      const sentenceEnd = /[.?!]["')]*\s*$/;

      const paragraphs = [];
      let buffer = '';

      for (let i = 0; i < segments.length; i++) {
        // Clean segment text: collapse internal newlines and runs of whitespace
        const cleaned = segments[i].text
          .replace(/[\r\n]+/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
        if (!cleaned) continue;

        // Append to buffer with a single joining space
        buffer = buffer ? buffer + ' ' + cleaned : cleaned;

        const isLast = i === segments.length - 1;

        // Signal A: length threshold reached at a sentence boundary
        if (buffer.length >= 350 && sentenceEnd.test(buffer)) {
          paragraphs.push(buffer.trim());
          buffer = '';
          continue;
        }

        // Signal B: notable timing pause before the next segment at a sentence boundary
        if (!isLast) {
          const gap = segments[i + 1].offset - segments[i].offset;
          if (gap >= 3 && buffer.length >= 80 && sentenceEnd.test(buffer)) {
            paragraphs.push(buffer.trim());
            buffer = '';
            continue;
          }
        }
      }

      // Push any remaining text as the final paragraph
      if (buffer.trim()) {
        paragraphs.push(buffer.trim());
      }

      // Fallback: single paragraph with no sentence punctuation — hard-wrap at ~500 chars
      if (paragraphs.length === 1 && !/[.?!]/.test(paragraphs[0])) {
        const raw    = paragraphs[0];
        const chunks = [];
        let pos = 0;
        while (pos < raw.length) {
          if (pos + 500 >= raw.length) {
            chunks.push(raw.slice(pos).trim());
            break;
          }
          // Walk back from pos+500 to find the nearest space to break on
          let cut = pos + 500;
          while (cut > pos && raw[cut] !== ' ') cut--;
          if (cut === pos) cut = pos + 500; // no space found — hard cut
          chunks.push(raw.slice(pos, cut).trim());
          pos = cut + 1;
        }
        return chunks.filter(Boolean);
      }

      return paragraphs;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // For use in HTML attribute values (double-quoted)
    function escapeAttr(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderSegments(segments) {
      if (!segments || segments.length === 0) {
        outputEl.textContent = '(No transcript segments returned.)';
        outputEl.classList.add('visible');
        return;
      }

      if (getMode() === 'plain') {
        // Reflow fragments into readable paragraphs; each becomes a <p> element
        const paras = reflowToParagraphs(segments);
        outputEl.innerHTML = paras
          .map(p => `<p>${escapeHtml(p)}</p>`)
          .join('');
      } else {
        // Timecoded mode: gutter layout — timecode left, caption text right
        outputEl.innerHTML = segments.map(s =>
          `<div class="ts-line"><span class="ts-badge">${formatTime(s.offset)}</span><span class="ts-text">${escapeHtml(s.text)}</span></div>`
        ).join('');
      }

      outputEl.classList.add('visible');
    }

    /* ==============================================
       NOW READING STRIP
    =============================================== */
    function updateNowReading() {
      if (!currentMeta) {
        nowReadingEl.hidden = true;
        return;
      }
      nowReadingTitle.textContent = currentMeta.title || currentMeta.videoId;
      nowReadingUrl.textContent   = currentMeta.url;
      nowReadingUrl.href          = currentMeta.url;
      nowReadingEl.hidden         = false;
    }

    /* ==============================================
       FETCH TRANSCRIPT
    =============================================== */
    async function fetchTranscript() {
      const url = urlInput.value.trim();
      if (!url) { setStatus('Please enter a YouTube URL or video ID.', true); return; }

      fetchBtn.disabled = true;
      outputEl.classList.remove('visible');

      // Reset meta state on new fetch
      currentMeta   = null;
      currentDigest = null;
      updateNowReading();

      // Reset digest area completely on a new fetch
      digestBtn.disabled = true;
      saveBtn.disabled   = true;
      digestOutput.classList.remove('visible');
      digestOutput.innerHTML    = '';
      digestStatus.textContent  = '';
      digestStatus.className    = '';
      digestEmptySt.classList.remove('is-hidden');
      usageStatsEl.classList.remove('visible');
      usageStatsEl.innerHTML    = '';
      digestDot.style.display   = 'none';
      setTopIndicator('idle');
      switchTab('transcript');

      setStatus('Fetching transcript…');

      try {
        const res  = await fetch('/api/transcript', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ url }),
        });
        const data = await res.json();

        if (!res.ok) {
          const msg    = data.error || 'Unknown error.';
          const detail = data.detail ? `\n\nDetail: ${data.detail}` : '';
          setStatus(msg + detail, true);
          lastSegments = null;
          return;
        }

        lastSegments  = data.segments;
        currentMeta   = { videoId: data.videoId, url: data.url, title: data.title };
        currentDigest = null;
        updateNowReading();

        setStatus(`Loaded ${data.segments.length} segments for video ${data.videoId}.`);
        renderSegments(lastSegments);
        digestBtn.disabled = false;
        saveBtn.disabled   = false;
      } catch (err) {
        setStatus('Network error: ' + err.message, true);
        lastSegments = null;
      } finally {
        fetchBtn.disabled = false;
      }
    }

    fetchBtn.addEventListener('click', fetchTranscript);
    urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') fetchTranscript(); });
    radios.forEach(r => r.addEventListener('change', () => {
      syncToggleActive();
      if (lastSegments) renderSegments(lastSegments);
    }));

    /* ==============================================
       MARKDOWN RENDERER
    =============================================== */
    /**
     * Minimal inline Markdown renderer.
     * Supports: ## h2, ### h3, - / * bullet lists, **bold**, paragraphs.
     * HTML is escaped before Markdown transforms to prevent injection.
     */
    function renderMarkdown(md) {
      // 1. Escape HTML in the raw source first.
      function esc(s) {
        return s
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      // 2. Apply inline transforms (bold) to an already-escaped string.
      function inlineMarkdown(s) {
        // **bold** or __bold__
        return s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/__(.+?)__/g, '<strong>$1</strong>');
      }

      // 3. Split into lines, process block-level elements.
      const lines = esc(md).split('\n');
      const html  = [];
      let listOpen   = false;
      let paraBuffer = [];

      function flushPara() {
        if (paraBuffer.length === 0) return;
        const content = paraBuffer.join(' ').trim();
        if (content) html.push(`<p>${inlineMarkdown(content)}</p>`);
        paraBuffer = [];
      }

      function closeList() {
        if (listOpen) { html.push('</ul>'); listOpen = false; }
      }

      for (const rawLine of lines) {
        const line = rawLine.trimEnd();

        // Blank line — flush paragraph / close list
        if (!line.trim()) {
          flushPara();
          closeList();
          continue;
        }

        // ### heading (must check before ##)
        if (line.startsWith('### ')) {
          flushPara(); closeList();
          html.push(`<h3>${inlineMarkdown(line.slice(4).trim())}</h3>`);
          continue;
        }

        // ## heading
        if (line.startsWith('## ')) {
          flushPara(); closeList();
          html.push(`<h2>${inlineMarkdown(line.slice(3).trim())}</h2>`);
          continue;
        }

        // # heading (h1 — render as h2 for safety)
        if (line.startsWith('# ')) {
          flushPara(); closeList();
          html.push(`<h2>${inlineMarkdown(line.slice(2).trim())}</h2>`);
          continue;
        }

        // Bullet list item: "- " or "* " at the start (possibly indented)
        const bulletMatch = line.match(/^(\s*[-*])\s+(.+)$/);
        if (bulletMatch) {
          flushPara();
          if (!listOpen) { html.push('<ul>'); listOpen = true; }
          html.push(`<li>${inlineMarkdown(bulletMatch[2])}</li>`);
          continue;
        }

        // Regular text line — accumulate into paragraph buffer
        // (close any open list first since a non-bullet line ends the list)
        closeList();
        paraBuffer.push(line.trim());
      }

      // Flush anything remaining
      flushPara();
      closeList();

      return html.join('\n');
    }

    function buildPlainTranscript(segments) {
      return segments
        .map(s => s.text.replace(/[\r\n]+/g, ' ').replace(/\s+/g, ' ').trim())
        .filter(Boolean)
        .join(' ');
    }

    /* ==============================================
       DIGEST HANDLER
    =============================================== */
    digestBtn.addEventListener('click', async () => {
      if (!lastSegments || lastSegments.length === 0) return;

      digestBtn.disabled = true;
      digestOutput.classList.remove('visible');
      digestOutput.innerHTML   = '';
      usageStatsEl.classList.remove('visible');
      usageStatsEl.innerHTML   = '';

      // Switch to Digest tab and show loading state there
      switchTab('digest');
      digestEmptySt.classList.add('is-hidden');
      setTopIndicator('digesting');
      setDigestStatus('Reading the video and writing your digest — this takes 10–30s.', false);

      const plainText = buildPlainTranscript(lastSegments);

      try {
        const res  = await fetch('/api/digest', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ text: plainText }),
        });
        const data = await res.json();

        if (!res.ok) {
          const detail = data.detail ? ` — ${data.detail}` : '';
          setDigestStatus((data.error || 'Unknown error.') + detail, true);
          setTopIndicator('error');
          digestEmptySt.classList.remove('is-hidden');
          return;
        }

        // Render digest content
        digestOutput.innerHTML =
          '<div class="digest-eyebrow">AI Digest</div>' +
          renderMarkdown(data.digest);
        digestOutput.classList.add('visible');

        // Capture digest text so Save can include it
        currentDigest = data.digest;

        // Show ready dot on tab, update status, set indicator
        digestDot.style.display = '';
        setDigestStatus('Digest ready.', false);
        setTopIndicator('done');

        // Usage readouts
        if (data.usage) {
          renderUsageStats(data.usage);
        }

        // Refresh header chip 2 s later so it picks up the new cost
        setTimeout(loadUsageChip, 2000);

        // Stay on / switch to Digest tab
        switchTab('digest');

      } catch (err) {
        setDigestStatus('Network error: ' + err.message, true);
        setTopIndicator('error');
        digestEmptySt.classList.remove('is-hidden');
      } finally {
        digestBtn.disabled = false;
      }
    });

    /* ==============================================
       SAVE BUTTON HANDLER
    =============================================== */
    saveBtn.addEventListener('click', async () => {
      if (!currentMeta || !lastSegments) return;

      const origLabel    = saveBtn.textContent;
      saveBtn.disabled   = true;

      try {
        const res = await fetch('/api/saved', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            url:      currentMeta.url,
            videoId:  currentMeta.videoId,
            title:    currentMeta.title,
            segments: lastSegments,
            digest:   currentDigest,
          }),
        });

        if (!res.ok) {
          await res.json().catch(() => null);
          saveBtn.textContent = 'Error — try again';
          setTimeout(() => { saveBtn.textContent = origLabel; saveBtn.disabled = false; }, 2500);
          return;
        }

        saveBtn.textContent = 'Saved ✓';
        setTimeout(() => { saveBtn.textContent = origLabel; saveBtn.disabled = false; }, 2000);
        loadSaved(); // keep the Saved list fresh in the background
      } catch (err) {
        saveBtn.textContent = 'Network error';
        setTimeout(() => { saveBtn.textContent = origLabel; saveBtn.disabled = false; }, 2500);
      }
    });

    /* ==============================================
       SAVED LIBRARY — LOAD & RENDER
    =============================================== */
    async function loadSaved() {
      try {
        const res = await fetch('/api/saved');
        if (!res.ok) {
          savedOutput.innerHTML =
            '<p class="saved-empty-state">Could not load saved videos.</p>';
          return;
        }
        const data = await res.json();
        renderSavedList(data);
      } catch (_) {
        savedOutput.innerHTML =
          '<p class="saved-empty-state">Network error — could not load saved videos.</p>';
      }
    }

    function renderSavedList(entries) {
      if (!Array.isArray(entries) || entries.length === 0) {
        savedOutput.innerHTML =
          '<p class="saved-empty-state">Nothing saved yet — load a video and hit ★ Save.</p>';
        return;
      }

      savedOutput.innerHTML = entries.map(entry => {
        const title   = entry.title || entry.videoId;
        const d       = new Date(entry.savedAt);
        const dateStr = isNaN(d.getTime())
          ? ''
          : d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) +
            ' · ' +
            d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });

        const badge = entry.hasDigest
          ? '<span class="saved-badge">Digest</span>'
          : '';
        const segs  = entry.segmentCount != null
          ? `<span class="saved-meta-item">${entry.segmentCount} lines</span>`
          : '';
        const sep   = (dateStr && (segs || entry.hasDigest))
          ? '<span class="saved-meta-sep" aria-hidden="true">·</span>'
          : '';

        return `<div class="saved-card"
                     data-videoid="${escapeAttr(entry.videoId)}"
                     tabindex="0"
                     role="button"
                     aria-label="Open ${escapeAttr(title)}">
          <div class="saved-card-main">
            <div class="saved-card-title">${escapeHtml(title)}</div>
            <a class="saved-card-url"
               href="${escapeAttr(entry.url)}"
               target="_blank"
               rel="noopener noreferrer">${escapeHtml(entry.url)}</a>
            <div class="saved-card-meta">
              ${dateStr ? `<span class="saved-meta-item">${escapeHtml(dateStr)}</span>` : ''}
              ${sep}${segs}${badge}
            </div>
          </div>
          <button class="saved-delete-btn"
                  data-videoid="${escapeAttr(entry.videoId)}"
                  aria-label="Delete ${escapeAttr(title)}">✕ Delete</button>
        </div>`;
      }).join('');

      // Wire up card clicks — open in app unless user clicked the URL link or delete btn
      savedOutput.querySelectorAll('.saved-card').forEach(card => {
        card.addEventListener('click', e => {
          if (e.target.closest('.saved-delete-btn')) return;
          if (e.target.closest('.saved-card-url'))   return; // let real anchor navigate
          openSavedEntry(card.dataset.videoid);
        });
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openSavedEntry(card.dataset.videoid);
          }
        });
      });

      // Wire up delete buttons
      savedOutput.querySelectorAll('.saved-delete-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          deleteSavedEntry(btn.dataset.videoid);
        });
      });
    }

    /* ==============================================
       SAVED LIBRARY — OPEN ENTRY
    =============================================== */
    async function openSavedEntry(videoId) {
      try {
        const res = await fetch(`/api/saved/${encodeURIComponent(videoId)}`);
        if (res.status === 404) {
          alert('This saved entry was not found. It may have been deleted.');
          loadSaved();
          return;
        }
        if (!res.ok) {
          alert('Failed to open saved video. Please try again.');
          return;
        }
        const entry = await res.json();

        // Restore shared state
        lastSegments  = entry.segments;
        currentMeta   = { videoId: entry.videoId, url: entry.url, title: entry.title };
        currentDigest = entry.digest || null;

        // Sync UI — command bar and now-reading strip
        urlInput.value = entry.url;
        updateNowReading();

        // Full digest-pane reset
        digestOutput.classList.remove('visible');
        digestOutput.innerHTML   = '';
        digestStatus.textContent = '';
        digestStatus.className   = '';
        digestEmptySt.classList.remove('is-hidden');
        usageStatsEl.classList.remove('visible');
        usageStatsEl.innerHTML   = '';
        digestDot.style.display  = 'none';
        setTopIndicator('idle');

        // Restore digest content if it was saved
        if (entry.digest) {
          digestOutput.innerHTML =
            '<div class="digest-eyebrow">AI Digest</div>' +
            renderMarkdown(entry.digest);
          digestOutput.classList.add('visible');
          digestEmptySt.classList.add('is-hidden');
          digestDot.style.display = '';
          setDigestStatus('Digest ready.', false);
        }

        // Render transcript and enable action buttons
        renderSegments(lastSegments);
        digestBtn.disabled = false;
        saveBtn.disabled   = false;

        setStatus(`Loaded ${entry.segments.length} segments for video ${entry.videoId}.`);

        // Land on Transcript tab
        switchTab('transcript');

      } catch (err) {
        alert('Network error: ' + err.message);
      }
    }

    /* ==============================================
       SAVED LIBRARY — DELETE ENTRY
    =============================================== */
    async function deleteSavedEntry(videoId) {
      if (!confirm('Delete this saved video? This cannot be undone.')) return;
      try {
        const res = await fetch(`/api/saved/${encodeURIComponent(videoId)}`, {
          method: 'DELETE',
        });
        if (!res.ok) {
          alert('Failed to delete. Please try again.');
          return;
        }
        loadSaved();
      } catch (err) {
        alert('Network error: ' + err.message);
      }
    }

    /* ==============================================
       INITIALISE
    =============================================== */
    loadUsageChip();
    loadSaved();
  </script>
</body>
</html>
