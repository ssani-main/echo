<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Echo</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0f1115;
    color: #e6e6e6;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap { text-align: center; }
  .spinner {
    width: 36px;
    height: 36px;
    margin: 0 auto 16px;
    border: 3px solid rgba(230,230,230,0.2);
    border-top-color: #e6e6e6;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { opacity: 0.75; font-size: 14px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <p>Starting Echo…</p>
  </div>
</body>
</html>
